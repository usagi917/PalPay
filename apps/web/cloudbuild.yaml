steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE_URI}
      - --build-arg
      - NEXT_PUBLIC_RPC_URL=${_NEXT_PUBLIC_RPC_URL}
      - --build-arg
      - NEXT_PUBLIC_CHAIN_ID=${_NEXT_PUBLIC_CHAIN_ID}
      - --build-arg
      - NEXT_PUBLIC_FACTORY_ADDRESS=${_NEXT_PUBLIC_FACTORY_ADDRESS}
      - --build-arg
      - NEXT_PUBLIC_TOKEN_ADDRESS=${_NEXT_PUBLIC_TOKEN_ADDRESS}
      - --build-arg
      - NEXT_PUBLIC_BLOCK_EXPLORER_TX_BASE=${_NEXT_PUBLIC_BLOCK_EXPLORER_TX_BASE}
      - --build-arg
      - NEXT_PUBLIC_XMTP_ENV=${_NEXT_PUBLIC_XMTP_ENV}
      - --build-arg
      - CHAIN_ID=${_CHAIN_ID}
      - --build-arg
      - GCP_PROJECT_ID=${_GCP_PROJECT_ID}
      - --build-arg
      - GCP_LOCATION=${_GCP_LOCATION}
      - --build-arg
      - GEMINI_MODEL=${_GEMINI_MODEL}
      - .

images:
  - ${_IMAGE_URI}

substitutions:
  _IMAGE_URI: us-central1-docker.pkg.dev/$PROJECT_ID/wagyu-repo/wagyu-escrow:latest
  _NEXT_PUBLIC_RPC_URL: ""
  _NEXT_PUBLIC_CHAIN_ID: "84532"
  _NEXT_PUBLIC_FACTORY_ADDRESS: ""
  _NEXT_PUBLIC_TOKEN_ADDRESS: ""
  _NEXT_PUBLIC_BLOCK_EXPLORER_TX_BASE: ""
  _NEXT_PUBLIC_XMTP_ENV: "dev"
  _CHAIN_ID: ""
  _GCP_PROJECT_ID: "$PROJECT_ID"
  _GCP_LOCATION: "us-central1"
  _GEMINI_MODEL: "gemini-2.5-flash"

options:
  logging: CLOUD_LOGGING_ONLY
